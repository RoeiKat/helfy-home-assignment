services:
  pd:
    image: pingcap/pd:v8.1.0
    container_name: pd
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
    ports:
      - "2379:2379"
    volumes:
      - pd-data:/data/pd

  tikv:
    image: pingcap/tikv:v8.1.0
    container_name: tikv
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --pd=pd:2379
      - --data-dir=/data/tikv
    depends_on:
      - pd
    volumes:
      - tikv-data:/data/tikv

  tidb:
    image: pingcap/tidb:v8.1.0
    container_name: tidb
    command:
      - --store=tikv
      - --path=pd:2379
      - --host=0.0.0.0
    ports:
      - "4000:4000"
    depends_on:
      - pd
      - tikv

  init-db:
    image: mysql:8.0
    container_name: init-db
    depends_on:
      - tidb
    env_file:
      - .env
    volumes:
      - ./tidb/init:/docker-entrypoint-initdb.d
      - ./scripts/init-db.sh:/scripts/init-db.sh
    entrypoint: ["/bin/sh", "/scripts/init-db.sh"]
    restart: "no"

  api:
    build:
      context: ./api
    container_name: api
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data  

  ticdc:
    image: pingcap/ticdc:v8.1.0
    container_name: ticdc
    command:
      - /cdc
      - server
      - --pd=http://pd:2379
      - --addr=0.0.0.0:8300
      - --advertise-addr=ticdc:8300
    depends_on:
      - pd
      - tikv
      - tidb
    ports:
      - "8300:8300"
    restart: unless-stopped

  init-cdc:
    image: pingcap/ticdc:v8.1.0
    container_name: init-cdc
    depends_on:
      - ticdc
      - kafka
      - init-db
    env_file:
      - .env
    volumes:
      - ./scripts/start-cdc-task.sh:/scripts/start-cdc-task.sh
    entrypoint: ["/bin/sh", "/scripts/start-cdc-task.sh"]
    restart: "no"

  consumer:
    build:
      context: ./consumer
    container_name: consumer
    env_file:
      - .env
    depends_on:
      - kafka
      - init-cdc
    restart: unless-stopped
  


volumes:
  pd-data:
  tikv-data:
  kafka-data: